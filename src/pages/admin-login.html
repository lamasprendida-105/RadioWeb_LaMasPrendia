<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin | La Más Prendida 105.1 FM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="admin-login.css">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon">
                <i class="fas fa-microphone-alt"></i>
            </div>
            <h1>La Más Prendida</h1>
            <p>Panel de Administración</p>
        </div>
        
        <form id="loginForm" class="login-form">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Usuario" autocomplete="off" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Iniciar sesión
            </button>
        </form>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="login-footer">
            <p><i class="fas fa-shield-alt"></i> Acceso restringido - Solo personal autorizado</p>
        </div>
    </div>
    
    <div class="login-background">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>
</div>

<script src="admin-login.js"></script>
</body>
</html>
